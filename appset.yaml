apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cronjob-appset
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: app-1
        namespace: ns-app-1
      - name: app-2
        namespace: ns-app-2
      - name: app-3
        namespace: ns-app-3
      - name: app-4
        namespace: ns-app-4
      - name: app-5
        namespace: ns-app-5
      - name: app-6
        namespace: ns-app-6
      - name: app-7
        namespace: ns-app-7
      - name: app-8
        namespace: ns-app-8
      - name: app-9
        namespace: ns-app-9
      - name: app-10
        namespace: ns-app-10
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      destination:
        server: REPLACE_WITH_YOUR_CLUSTER_SERVER
        namespace: '{{namespace}}'
      source:
        repoURL: REPLACE_WITH_YOUR_GITHUB_REPO
        targetRevision: HEAD
        path: apps/{{name}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
