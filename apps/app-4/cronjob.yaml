apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-job-4
  labels:
    app.kubernetes.io/instance: app-4
    tags.datadoghq.com/service: cron-job-4
spec:
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 100
      backoffLimit: 3
      ttlSecondsAfterFinished: 100
      template:
        metadata:
          labels:
            app: cron-job-4
        spec:
          restartPolicy: Never
          serviceAccountName: sa-app-4
          containers:
          - name: cron-job-4
            image: busybox:latest
            command: ["sh", "-c", "echo Running job 4 && sleep 10"]
            envFrom:
            - configMapRef:
                name: app-4-configmap
            - secretRef:
                name: app-4-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 500Mi
