apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: root-app
 namespace: argocd
spec:
 project: default
 source:
   repoURL: https://github.com/mmayman-amaz/argocd-repro-test.git
   targetRevision: HEAD
   path: .
   directory:
     include: 'appset.yaml'
 destination:
   server: https://kubernetes.default.svc
   namespace: argocd
 syncPolicy:
   automated:
     prune: true
     selfHeal: true
